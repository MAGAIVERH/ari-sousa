<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" fill="none" role="img" aria-label="Professor em kimono Gracie Barra">
  <defs>
    <linearGradient id="bgKimono" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(222 55% 18%)" stop-opacity="0"/>
      <stop offset="100%" stop-color="hsl(222 55% 8%)" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="giBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(222 60% 28%)"/>
      <stop offset="100%" stop-color="hsl(222 65% 18%)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bgKimono)"/>
  <!-- silhouette base -->
  <ellipse cx="300" cy="820" rx="180" ry="28" fill="hsl(222 47% 5%)" opacity="0.5"/>
  <!-- legs -->
  <path d="M230 520 L210 780 L270 780 L290 520 Z" fill="hsl(0 0% 96%)"/>
  <path d="M370 520 L390 780 L330 780 L310 520 Z" fill="hsl(0 0% 96%)"/>
  <!-- gi body -->
  <path d="M180 280 Q300 240 420 280 L450 520 Q300 560 150 520 Z" fill="hsl(0 0% 98%)"/>
  <!-- blue lapels GB style -->
  <path d="M240 280 L300 420 L360 280 L330 260 L300 380 L270 260 Z" fill="url(#giBlue)"/>
  <path d="M200 300 L170 500 L230 510 L260 310 Z" fill="url(#giBlue)" opacity="0.9"/>
  <path d="M400 300 L430 500 L370 510 L340 310 Z" fill="url(#giBlue)" opacity="0.9"/>
  <!-- belt black 2nd degree -->
  <rect x="175" y="490" width="250" height="22" rx="4" fill="hsl(222 47% 8%)"/>
  <rect x="285" y="488" width="30" height="26" rx="2" fill="hsl(0 78% 48%)"/>
  <rect x="292" y="510" width="16" height="55" rx="2" fill="hsl(222 47% 8%)"/>
  <!-- arms -->
  <path d="M170 310 Q120 380 130 460 L175 450 Q165 390 200 330 Z" fill="hsl(0 0% 96%)"/>
  <path d="M430 310 Q480 380 470 460 L425 450 Q435 390 400 330 Z" fill="hsl(0 0% 96%)"/>
  <!-- head -->
  <circle cx="300" cy="200" r="72" fill="hsl(28 30% 35%)"/>
  <ellipse cx="300" cy="175" rx="78" ry="28" fill="hsl(28 25% 22%)"/>
  <!-- GB patch placeholder -->
  <circle cx="215" cy="360" r="22" fill="hsl(0 78% 48%)" opacity="0.85"/>
  <text x="215" y="366" text-anchor="middle" fill="hsl(0 0% 100%)" font-size="11" font-family="Arial,sans-serif" font-weight="bold">GB</text>
</svg>
