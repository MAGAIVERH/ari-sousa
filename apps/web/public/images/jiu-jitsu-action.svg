  <path d="M490 330 L520 400 L550 330 Z" fill="hsl(222 60% 28%)"/>
  <!-- athlete bottom -->
  <circle cx="400" cy="390" r="32" fill="hsl(28 30% 35%)"/>
  <path d="M350 400 Q320 440 310 500 L380 510 Q390 460 410 410 Z" fill="hsl(222 55% 16%)"/>
  <path d="M450 400 Q500 430 520 490 L450 500 Q430 450 420 410 Z" fill="hsl(222 55% 16%)"/>
