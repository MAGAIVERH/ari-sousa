  <path d="M620 250 Q700 280 750 350" stroke="hsl(0 78% 48%)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <text x="48" y="56" fill="hsl(0 78% 48%)" font-family="Arial,sans-serif" font-size="14" font-weight="bold" letter-spacing="3">JIU-JITSU PRIVATE</text>
</svg>
