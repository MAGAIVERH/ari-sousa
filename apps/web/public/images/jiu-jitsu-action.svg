<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" fill="none" role="img" aria-label="Jiu-Jitsu em açăo no tatame">
  <defs>
    <linearGradient id="tatameBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(222 55% 10%)"/>
      <stop offset="100%" stop-color="hsl(222 47% 5%)"/>
    </linearGradient>
    <linearGradient id="tatameMat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(222 38% 18%)"/>
      <stop offset="100%" stop-color="hsl(222 42% 12%)"/>
    </linearGradient>
  </defs>
  <rect width="960" height="600" fill="url(#tatameBg)"/>
  <!-- tatame lines -->
  <g opacity="0.15" stroke="hsl(0 0% 98%)" stroke-width="1">
    <line x1="0" y1="420" x2="960" y2="420"/>
    <line x1="0" y1="480" x2="960" y2="480"/>
    <line x1="160" y1="380" x2="160" y2="600"/>
    <line x1="480" y1="380" x2="480" y2="600"/>
    <line x1="800" y1="380" x2="800" y2="600"/>
  </g>
  <rect x="0" y="380" width="960" height="220" fill="url(#tatameMat)"/>
  <!-- athlete top (guard pass) -->
  <ellipse cx="520" cy="340" rx="55" ry="22" fill="hsl(28 25% 22%)"/>
  <circle cx="520" cy="300" r="38" fill="hsl(28 30% 35%)"/>
  <path d="M470 320 Q420 360 400 420 L460 430 Q475 380 500 340 Z" fill="hsl(0 0% 96%)"/>
  <path d="M560 320 Q610 350 630 400 L570 410 Q555 370 540 340 Z" fill="hsl(0 0% 96%)"/>
